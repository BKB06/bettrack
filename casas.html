<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>BetTracker - Casas de Aposta</title>
  <link rel="stylesheet" href="styles.css?v=5">
</head>
<body>
  
  <div id="auth-loading" style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: var(--bg-body); z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; color: var(--text);">
    <h2>Carregando...</h2>
  </div>
  <div id="login-screen" style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: var(--bg-body); z-index: 9998; display: none; flex-direction: column; justify-content: center; align-items: center; color: var(--text);">
    <div style="font-size: 48px; margin-bottom: 16px;">🎯</div>
    <h1 style="margin-bottom: 8px;">BetTracker</h1>
    <p style="color: var(--muted); margin-bottom: 24px;">Faça login para acessar suas apostas na nuvem.</p>
    <button class="btn btn--primary" onclick="loginWithGoogle()" style="padding: 12px 24px; display: flex; align-items: center; gap: 8px;">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12.545,10.239v3.821h5.445c-0.712,2.315-2.647,3.972-5.445,3.972c-3.332,0-6.033-2.701-6.033-6.032s2.701-6.032,6.033-6.032c1.498,0,2.866,0.549,3.921,1.453l2.814-2.814C17.503,2.988,15.139,2,12.545,2C7.021,2,2.543,6.477,2.543,12s4.478,10,10.002,10c8.396,0,10.249-7.85,9.426-11.761H12.545z"/></svg>
      Entrar com Google
    </button>
  </div>

  <div class="app-wrapper" id="main-app-wrapper" style="display: none;">
    <div id="global-topbar"></div>
    <div class="app-body" id="app-body">
      <aside class="desktop-sidebar" id="global-sidebar"></aside>
      
      <main class="app-main desktop-main mobile-main" id="app-main">
      <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 24px;">
        <div>
          <p class="eyebrow">PORTFÓLIO</p>
          <h1 class="page-title">Casas de Aposta</h1>
        </div>
        <button class="btn btn--subtle btn--sm" id="btn-add-bk">+ Adicionar</button>
      </div>

      <!-- Add Bookmaker Form (Hidden by default) -->
      <form id="add-bk-form" class="card" style="display:none; margin-bottom: 24px;">
        <h2 style="font-size: 18px; font-weight: 800; margin-bottom: 16px;">Nova Casa</h2>
        <div class="field">
          <label class="field-label">NOME</label>
          <input type="text" class="input" id="new-bk-name" placeholder="Ex: KTO, Pinnacle..." required>
        </div>
        <div class="field">
          <label class="field-label">COR</label>
          <div class="color-picker" id="color-picker">
            <div class="color-swatch active" style="background: #ff3c3c" data-color="#ff3c3c"></div>
            <div class="color-swatch" style="background: #ff8a00" data-color="#ff8a00"></div>
            <div class="color-swatch" style="background: #4da8ff" data-color="#4da8ff"></div>
            <div class="color-swatch" style="background: #a78bfa" data-color="#a78bfa"></div>
            <div class="color-swatch" style="background: #00d2ff" data-color="#00d2ff"></div>
            <div class="color-swatch" style="background: #ff5e3a" data-color="#ff5e3a"></div>
            <div class="color-swatch" style="background: #6ab04c" data-color="#6ab04c"></div>
            <div class="color-swatch" style="background: #636e72" data-color="#636e72"></div>
            <div class="color-swatch" style="background: #ffb800" data-color="#ffb800"></div>
            <div class="color-swatch" style="background: #00e87a" data-color="#00e87a"></div>
          </div>
        </div>
        <button type="submit" class="btn btn--primary btn--full" style="margin-top: 8px;">Adicionar</button>
      </form>

      <!-- Totals -->
      <div class="mini-card-grid">
        <div class="mini-card">
          <div class="label">Total Esportivo</div>
          <div class="value green" id="total-sports">R$ 0,00</div>
        </div>
        <div class="mini-card" style="display:none;">
          <div class="label">Total Outros</div>
          <div class="value blue" id="total-casino">R$ 0,00</div>
        </div>
        <div class="mini-card">
          <div class="label">Exposto</div>
          <div class="value gold" id="total-exposed">R$ 0,00</div>
        </div>
      </div>

      <!-- Bookmakers List -->
      <div id="bookmakers-list"></div>

      </main>

      <aside class="desktop-right" id="global-right-panel"></aside>
    </div>
    <nav class="mobile-nav" id="global-mobile-nav"></nav>
  </div>

  
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="firebase-config.js"></script>

  <script src="app.js?v=11"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const user = await window.authStateReady;
      document.getElementById('auth-loading').style.display = 'none';
      if (!user) {
        document.getElementById('login-screen').style.display = 'flex';
        return;
      }
      document.getElementById('main-app-wrapper').style.display = '';

      let db = await loadDb();
      let selectedColor = '#ff3c3c';

      const formWrap = document.getElementById('add-bk-form');
      const btnAdd = document.getElementById('btn-add-bk');

      btnAdd.addEventListener('click', () => { formWrap.style.display = 'block'; });

      document.querySelectorAll('.color-swatch').forEach(swatch => {
        swatch.addEventListener('click', (e) => {
          document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
          e.target.classList.add('active');
          selectedColor = e.target.dataset.color;
        });
      });

      formWrap.addEventListener('submit', async (e) => {
        e.preventDefault();
        const name = document.getElementById('new-bk-name').value;

        db.bookmakers.push({
          id: generateId(),
          name,
          color: selectedColor,
          balance: 0
        });
        
        await saveDb(db);
        formWrap.reset();
        formWrap.style.display = 'none';
        refreshAll();
      });

      window.removeBookmaker = async (id) => {
        if(confirm('Apagar casa de apostas?')) {
          db = await loadDb();
          db.bookmakers = db.bookmakers.filter(b => b.id !== id);
          await saveDb(db);
          refreshAll();
        }
      };

      window.updateBalance = async (id, type, value) => {
        db = await loadDb();
        const bk = db.bookmakers.find(b => b.id === id);
        if (bk) {
          bk[type] = parseFloat(value) || 0;
          await saveDb(db);
          renderTotals(); // Just update totals without re-rendering everything to keep focus
        }
      };

      function renderTotals() {
        const tSports = db.bookmakers.reduce((sum, bk) => sum + Number(bk.balance !== undefined ? bk.balance : (bk.sportsBalance || 0)), 0);
        const tExposed = calculateExposed(db);

        document.getElementById('total-sports').textContent = formatMoney(tSports);
        document.getElementById('total-exposed').textContent = formatMoney(tExposed);
      }

      function renderList() {
        const list = document.getElementById('bookmakers-list');
        const sorted = db.bookmakers.slice().sort((a, b) => {
          const totalA = Number(a.balance !== undefined ? a.balance : (a.sportsBalance || 0));
          const totalB = Number(b.balance !== undefined ? b.balance : (b.sportsBalance || 0));
          return totalB - totalA;
        });

        list.innerHTML = sorted.map(bk => {
          const total = Number(bk.balance !== undefined ? bk.balance : (bk.sportsBalance || 0));
          
          const bkExposed = db.bets
            .filter(b => b.status === 'pending' && b.bookmakerId === bk.id)
            .reduce((sum, b) => sum + Number(b.stake), 0);

          let exposedHtml = `
            <div class="bookmaker-exposed" ${bkExposed === 0 ? 'style="visibility: hidden;"' : ''}>
              <span class="bookmaker-exposed__label">VALOR EXPOSTO</span>
              <span class="bookmaker-exposed__value">${formatMoney(bkExposed)}</span>
            </div>
          `;

          const isActive = total >= 0.01;
          const statusColor = isActive ? 'var(--green)' : 'var(--muted)';
          const initial = bk.name.charAt(0).toUpperCase();

          return `
            <div class="bookmaker-card">
              <div class="bookmaker-card__header">
                <div class="bookmaker-logo" style="background: rgba(255,255,255,0.05); color: ${bk.color}">
                  ${initial}
                </div>
                <div class="bookmaker-title-wrapper">
                  <div class="bookmaker-name">${bk.name}</div>
                  <div class="bookmaker-status">
                    <div class="status-dot" style="background: ${statusColor}"></div>
                    ${isActive ? 'ativo' : 'inativo'}
                  </div>
                </div>
                <button class="bookmaker-remove" onclick="removeBookmaker('${bk.id}')" title="Remover Casa">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
              </div>
              
              <div class="bookmaker-card__divider"></div>
              
              <div class="bookmaker-card__body">
                <div class="label" style="font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; font-weight: 700;">SALDO</div>
                <div style="display: flex; align-items: baseline; gap: 4px; margin-bottom: 16px;">
                  <span style="color: ${statusColor}; font-size: 15px; font-weight: 800; font-family: var(--mono);">R$</span>
                  <input type="number" step="0.01" class="bookmaker-balance-input" style="color: ${statusColor};" value="${total.toFixed(2)}" onchange="updateBalance('${bk.id}', 'balance', this.value); renderTotals();">
                </div>
                
                <div class="bookmaker-url-row">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>
                  <input type="text" class="url-input-clean" value="${(bk.url || getDefaultBookmakerUrl(bk.name)).replace(/^https?:\/\/(www\.)?/, '')}" onchange="updateUrl('${bk.id}', this.value.startsWith('http') ? this.value : 'https://' + this.value)" placeholder="dominio.com">
                  <a href="${bk.url || getDefaultBookmakerUrl(bk.name)}" target="_blank" class="external-link-btn" title="Acessar site" onclick="autoCheckin('${bk.id}')">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>
                  </a>
                </div>
              </div>
              
              ${exposedHtml}
            </div>
          `;
        }).join('');
      }

      function refreshAll() {
        renderTotals();
        renderList();
        updateGlobalUI();
      }

      window.autoCheckin = async (id) => {
        db = await loadDb();
        if (!db.dailyLogins.logins[id]) {
          markLogin(db, id);
          await saveDb(db);
        }
      };

      refreshAll();
    });
  </script>
</body>
</html>
