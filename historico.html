<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>BetTracker - Histórico</title>
  <link rel="stylesheet" href="styles.css?v=5">
</head>
<body>
  <div class="app-wrapper">
    <div id="global-topbar"></div>
    <div class="app-body" id="app-body">
      <aside class="desktop-sidebar" id="global-sidebar"></aside>
      
      <main class="app-main desktop-main mobile-main" id="app-main">
      <div style="margin-bottom: 16px;">
        <p class="eyebrow">VISÃO GERAL</p>
        <h1 class="page-title">Histórico</h1>
      </div>

      <!-- KPIs -->
      <div class="mini-card-grid" style="grid-template-columns: repeat(2, 1fr);">
        <div class="mini-card mini-card--green">
          <div class="label">MAIOR ODD ACERTADA</div>
          <div class="value green" id="kpi-max-odd-win">-</div>
        </div>
        <div class="mini-card" style="border-color: var(--red-border);">
          <div class="label">MENOR ODD PERDIDA</div>
          <div class="value red" id="kpi-min-odd-loss">-</div>
        </div>
        <div class="mini-card">
          <div class="label">MAIOR LUCRO (APOSTA)</div>
          <div class="value green" id="kpi-max-profit">-</div>
        </div>
        <div class="mini-card">
          <div class="label">MAIOR PERDA (APOSTA)</div>
          <div class="value red" id="kpi-max-loss">-</div>
        </div>
      </div>

      <!-- Calendário (Mobile Only) -->
      <section class="card mobile-only" style="margin-bottom: 24px;">
        <div class="cal-nav">
          <button class="btn btn--icon" id="cal-prev" style="border-radius:var(--radius-lg); width:32px; height:32px;">‹</button>
          <div class="cal-nav__center">
            <div class="cal-nav__month" id="cal-month-name" style="font-size:16px;">Mai 2026</div>
            <div class="cal-nav__info" id="cal-month-info">Apostado: <span class="c-gold">R$ 0,00</span> · PnL: <span class="c-green">+R$ 0,00</span></div>
          </div>
          <button class="btn btn--icon" id="cal-next" style="border-radius:var(--radius-lg); width:32px; height:32px;">›</button>
        </div>
        <div class="cal-headers">
          <div class="cal-header-cell">D</div>
          <div class="cal-header-cell">S</div>
          <div class="cal-header-cell">T</div>
          <div class="cal-header-cell">Q</div>
          <div class="cal-header-cell">Q</div>
          <div class="cal-header-cell">S</div>
          <div class="cal-header-cell">S</div>
        </div>
        <div class="cal-grid" id="cal-grid">
          <!-- JS fills this -->
        </div>
      </section>

      <!-- Lista Completa -->
      <section>
        <div class="filter-bar">
          <button class="filter-btn" data-filter="all">Todas</button>
          <button class="filter-btn active" data-filter="pending">Abertas</button>
          <button class="filter-btn" data-filter="won">Acertadas</button>
          <button class="filter-btn" data-filter="lost">Erradas</button>
          <button class="filter-btn" data-filter="void">Devolvidas</button>
        </div>
        <div id="all-bets-container"></div>
        <div id="pagination-container" class="pagination"></div>
      </section>

      </main>

      <aside class="desktop-right" id="global-right-panel"></aside>
    </div>
    <nav class="mobile-nav" id="global-mobile-nav"></nav>
  </div>

  <script src="app.js?v=5"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      let db = loadDb();
      let currentDate = new Date();
      let activeFilter = 'pending';
      let currentPageNum = 1;
      const ITEMS_PER_PAGE = 10;

      function renderKPIs() {
        const wonBets = db.bets.filter(b => b.status === 'won');
        const lostBets = db.bets.filter(b => b.status === 'lost');

        const maxOddWin = wonBets.length ? Math.max(...wonBets.map(b => b.odd)) : 0;
        const minOddLoss = lostBets.length ? Math.min(...lostBets.map(b => b.odd)) : 0;
        const maxProfit = wonBets.length ? Math.max(...wonBets.map(b => b.profit)) : 0;
        const maxLoss = lostBets.length ? Math.max(...lostBets.map(b => b.stake)) : 0;

        document.getElementById('kpi-max-odd-win').textContent = maxOddWin ? maxOddWin.toFixed(2) : '-';
        document.getElementById('kpi-min-odd-loss').textContent = minOddLoss ? minOddLoss.toFixed(2) : '-';
        document.getElementById('kpi-max-profit').textContent = maxProfit ? formatMoney(maxProfit) : '-';
        document.getElementById('kpi-max-loss').textContent = maxLoss ? formatMoney(maxLoss) : '-';
      }

      function resolveBet(betId, result) {
        const betIndex = db.bets.findIndex(b => b.id === betId);
        if (betIndex === -1) return;

        const bet = db.bets[betIndex];
        const bkIndex = db.bookmakers.findIndex(b => b.id === bet.bookmakerId);
        
        if (bkIndex !== -1) {
          if (result === 'won') {
            bet.profit = (bet.stake * bet.odd) - bet.stake;
            bet.status = 'won';
            
            if (bet.isFreebet) {
                // Freebet: devolve APENAS o lucro
                db.bookmakers[bkIndex].sportsBalance += bet.profit;
            } else {
                // Return stake + profit to bookmaker
                db.bookmakers[bkIndex].sportsBalance += (bet.stake + bet.profit);
            }
          } else if (result === 'lost') {
            bet.status = 'lost';
            if (bet.isFreebet) {
                bet.profit = 0; // Freebet perdida não gera perda financeira real
            } else {
                bet.profit = -bet.stake;
            }
            // Stake was already deducted when placed (if not freebet), nothing to add back
          } else if (result === 'void') {
            bet.profit = 0;
            bet.status = 'void';
            if (!bet.isFreebet) {
                // Return stake only if it wasn't a freebet
                db.bookmakers[bkIndex].sportsBalance += bet.stake;
            }
          }
        }
        
        saveDb(db);
        refreshAll();
      }

      function revertBet(betId) {
        const betIndex = db.bets.findIndex(b => b.id === betId);
        if (betIndex === -1) return;

        const bet = db.bets[betIndex];
        const bkIndex = db.bookmakers.findIndex(b => b.id === bet.bookmakerId);

        if (bkIndex !== -1) {
          if (bet.status === 'won') {
            if (bet.isFreebet) {
              db.bookmakers[bkIndex].sportsBalance -= bet.profit;
            } else {
              db.bookmakers[bkIndex].sportsBalance -= (bet.stake + bet.profit);
            }
          } else if (bet.status === 'void') {
            if (!bet.isFreebet) {
              db.bookmakers[bkIndex].sportsBalance -= bet.stake;
            }
          }
        }

        bet.status = 'pending';
        bet.profit = 0;
        
        saveDb(db);
        refreshAll();
      }

      window.resolveBet = resolveBet; // Expose to HTML inline onclick
      window.revertBet = revertBet;

      // Remove bet
      window.removeBet = (id) => {
        const betIndex = db.bets.findIndex(b => b.id === id);
        if (betIndex === -1) return;
        const bet = db.bets[betIndex];

        let msg = 'Excluir aposta? O valor investido será devolvido à banca como se a aposta nunca tivesse existido.';
        if (bet.status === 'void') {
          msg = 'Excluir aposta Devolvida? Como o dinheiro já havia retornado para a banca, isso apenas apagará o registro do histórico sem alterar o seu saldo atual.';
        } else if (bet.status === 'won') {
          msg = 'Excluir aposta Ganha? O lucro obtido será removido do seu saldo e o valor investido voltará ao estado original (como se nunca tivesse apostado).';
        }

        if(confirm(msg)) {
          // Revert its status to pending first so we undo wins/losses
          revertBet(id);
          
          // Now it's pending. If it was not a freebet, refund the initial stake
          // We need to find the index again because revertBet saved/mutated db
          const updatedBetIndex = db.bets.findIndex(b => b.id === id);
          if (updatedBetIndex !== -1) {
            const updatedBet = db.bets[updatedBetIndex];
            const bkIndex = db.bookmakers.findIndex(b => b.id === updatedBet.bookmakerId);
            if (bkIndex !== -1 && !updatedBet.isFreebet) {
              db.bookmakers[bkIndex].sportsBalance += updatedBet.stake;
              // Clean up any edge cases with max
              db.bookmakers[bkIndex].sportsBalance = Math.max(0, parseFloat(db.bookmakers[bkIndex].sportsBalance.toFixed(2)));
            }
            
            // Finally delete it
            db.bets.splice(updatedBetIndex, 1);
            saveDb(db);
            refreshAll();
          }
        }
      };

      function renderAllBets() {
        const container = document.getElementById('all-bets-container');
        let filtered = db.bets;
        
        if (activeFilter !== 'all') {
          filtered = filtered.filter(b => b.status === activeFilter);
        }

        // Sort by date desc
        filtered.sort((a, b) => new Date(b.date) - new Date(a.date));

        if (filtered.length === 0) {
          container.innerHTML = '<p class="empty-state">Nenhuma aposta encontrada</p>';
          document.getElementById('pagination-container').innerHTML = '';
          return;
        }

        const totalPages = Math.ceil(filtered.length / ITEMS_PER_PAGE);
        if (currentPageNum > totalPages) {
          currentPageNum = totalPages;
        }
        if (currentPageNum < 1) {
          currentPageNum = 1;
        }

        const startIndex = (currentPageNum - 1) * ITEMS_PER_PAGE;
        const endIndex = startIndex + ITEMS_PER_PAGE;
        const paginatedBets = filtered.slice(startIndex, endIndex);

        container.innerHTML = paginatedBets.map(b => {
          const bk = db.bookmakers.find(bk => bk.id === b.bookmakerId);
          const bkName = bk ? bk.name : 'Desconhecida';
          let statusBadge, pnlClass, pnlText, actionsHtml = '';

          if (b.status === 'pending') {
            const catClass = b.category === 'Outros' || b.category === 'Cassino' ? 'tag--purple' : 'tag--blue';
            const freebetTag = b.isFreebet ? '<span class="tag tag--gold" style="background:#ffb80044;">🎁 FREEBET</span>' : '';
            return `
              <div class="bet-card">
                <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px;">
                  <div class="bet-card__title" style="margin-bottom: 0;">${b.event}</div>
                  <button class="bet-card__delete" onclick="removeBet('${b.id}')" title="Excluir aposta (apagar do sistema)">
                    <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                  </button>
                </div>
                <div class="bet-card__tags" style="margin-bottom: 16px;">
                  <span class="tag tag--gold">⌛ ABERTA</span>
                  ${freebetTag}
                  <span class="tag ${catClass}">${b.category}</span>
                  <span class="tag" style="background: ${bk ? bk.color : '#fff'}22; color: ${bk ? bk.color : '#fff'};">${bkName}</span>
                </div>
                
                <div style="display: flex; justify-content: space-between; align-items: center; color: var(--muted); font-size: 13px; margin-bottom: 16px;">
                  <div>Odd <strong style="color:var(--text); font-family:var(--mono);">${b.odd.toFixed(2)}</strong></div>
                  <div>Stake <strong style="color:var(--text); font-family:var(--mono);">${formatMoney(b.stake)}</strong></div>
                  <div style="font-family:var(--mono); font-size: 12px;">${b.date}</div>
                </div>

                <div style="display: flex; gap: 8px; margin-bottom: 12px;">
                  <button class="btn btn--win" style="flex: 1;" onclick="resolveBet('${b.id}', 'won')">✓ Acertou</button>
                  <button class="btn btn--lose" style="flex: 1;" onclick="resolveBet('${b.id}', 'lost')">✗ Errou</button>
                  <button class="btn btn--icon" style="width: 42px; height: 42px; border-radius: var(--radius-md);" onclick="resolveBet('${b.id}', 'void')" title="Aposta Devolvida / Anulada">∅</button>
                </div>
              </div>
            `;
          } else if (b.status === 'won') {
            statusBadge = '<span class="badge badge--won">Ganhou</span>';
            pnlClass = 'bet-card__pnl--pos';
            pnlText = '+' + formatMoney(b.profit);
          } else if (b.status === 'lost') {
            statusBadge = '<span class="badge badge--lost">Perdeu</span>';
            pnlClass = 'bet-card__pnl--neg';
            pnlText = '-' + formatMoney(Math.abs(b.profit));
          } else {
            statusBadge = '<span class="badge badge--void">Void</span>';
            pnlClass = '';
            pnlText = 'R$ 0,00';
          }
          
          const freebetTagResolved = b.isFreebet ? '<span class="badge" style="background:#ffb80044; color:#ffb800;">🎁 Freebet</span>' : '';

          return `
            <div class="bet-card">
              <div class="bet-card__header">
                <div class="bet-card__info">
                  <div class="bet-card__title">${b.event}</div>
                  <div class="bet-card__tags">
                    ${statusBadge}
                    ${freebetTagResolved}
                    <span class="tag tag--muted">${bkName}</span>
                    <span class="tag tag--muted">Odd ${b.odd.toFixed(2)}</span>
                  </div>
                </div>
                <div class="bet-card__pnl ${pnlClass}">
                  ${pnlText}
                </div>
              </div>
              <div class="bet-card__footer" style="display:flex; justify-content:space-between; align-items:flex-end;">
                <div>
                  <span>Data: <strong>${b.date.split('-').reverse().join('/')}</strong></span><br>
                  <span>Stake: <strong>${formatMoney(b.stake)}</strong></span>
                </div>
                <div style="display: flex; gap: 8px;">
                  <button class="btn btn--secondary" style="padding: 4px 8px; font-size: 11px; height: auto;" onclick="revertBet('${b.id}')">↩ Desfazer</button>
                  <button class="bet-card__delete" onclick="removeBet('${b.id}')" title="Excluir aposta">
                    <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                  </button>
                </div>
              </div>
            </div>
          `;
        }).join('');

        renderPagination(totalPages);
      }

      function renderPagination(totalPages) {
        const paginationContainer = document.getElementById('pagination-container');
        if (totalPages <= 1) {
          paginationContainer.innerHTML = '';
          return;
        }

        let html = '';
        for (let i = 1; i <= totalPages; i++) {
          const activeClass = i === currentPageNum ? 'active' : '';
          html += `<button class="pagination-btn ${activeClass}" onclick="goToPage(${i})">${i}</button>`;
        }
        paginationContainer.innerHTML = html;
      }

      window.goToPage = function(page) {
        currentPageNum = page;
        renderAllBets();
        // Opcional: fazer scroll suave para o topo da lista
        document.getElementById('all-bets-container').scrollIntoView({ behavior: 'smooth', block: 'start' });
      };

      // Filter events
      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
          e.target.classList.add('active');
          activeFilter = e.target.dataset.filter;
          currentPageNum = 1;
          renderAllBets();
        });
      });

      // Calendar logic
      function renderCalendar() {
        const year = currentDate.getFullYear();
        const month = currentDate.getMonth();
        const monthNames = ["Jan", "Fev", "Mar", "Abr", "Mai", "Jun", "Jul", "Ago", "Set", "Out", "Nov", "Dez"];
        document.getElementById('cal-month-name').textContent = `${monthNames[month]} ${year}`;

        const grid = document.getElementById('cal-grid');
        grid.innerHTML = '';

        const firstDayIndex = new Date(year, month, 1).getDay();
        const daysInMonth = new Date(year, month + 1, 0).getDate();
        
        let monthStaked = 0;
        let monthPnL = 0;

        // Group bets by date
        const dailyProfit = {};
        db.bets.filter(b => b.status !== 'pending').forEach(b => {
          const bDate = new Date(b.date);
          const bYear = bDate.getFullYear();
          const bMonth = bDate.getMonth();
          
          if (bYear === year && bMonth === month) {
            monthStaked += b.stake;
            monthPnL += b.profit;
          }

          const key = b.date; // already YYYY-MM-DD
          if (!dailyProfit[key]) dailyProfit[key] = 0;
          dailyProfit[key] += b.profit;
        });

        // Update month info
        const pnlStr = monthPnL >= 0 ? `+${formatMoney(monthPnL)}` : `-${formatMoney(Math.abs(monthPnL))}`;
        const pnlColor = monthPnL >= 0 ? 'c-green' : 'c-red';
        document.getElementById('cal-month-info').innerHTML = `Apostado: <span class="c-gold">${formatMoney(monthStaked)}</span> · PnL: <span class="${pnlColor}">${pnlStr}</span>`;

        // Previous month padding
        for (let x = 0; x < firstDayIndex; x++) {
          grid.innerHTML += `<div class="cal-cell" style="border-color:transparent"></div>`;
        }

        // Days
        const todayStr = new Date().toISOString().split('T')[0];

        for (let i = 1; i <= daysInMonth; i++) {
          const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(i).padStart(2, '0')}`;
          let cellClass = 'cal-cell';
          let pnlHtml = '';

          if (dateStr === todayStr) cellClass += ' cal-cell--today';

          if (dailyProfit[dateStr] !== undefined) {
            const pnl = dailyProfit[dateStr];
            if (pnl > 0) {
              cellClass += ' cal-cell--win';
              pnlHtml = `<div class="cal-cell__pnl">+${pnl.toFixed(0)}</div>`;
            } else if (pnl < 0) {
              cellClass += ' cal-cell--lose';
              pnlHtml = `<div class="cal-cell__pnl">${pnl.toFixed(0)}</div>`;
            } else {
               pnlHtml = `<div class="cal-cell__pnl" style="color:var(--muted)">0</div>`;
            }
          }

          grid.innerHTML += `<div class="${cellClass}">${i}${pnlHtml}</div>`;
        }
      }

      document.getElementById('cal-prev').addEventListener('click', () => {
        currentDate.setMonth(currentDate.getMonth() - 1);
        renderCalendar();
      });

      document.getElementById('cal-next').addEventListener('click', () => {
        currentDate.setMonth(currentDate.getMonth() + 1);
        renderCalendar();
      });

      function refreshAll() {
        renderKPIs();
        renderAllBets();
        renderCalendar();
        updateGlobalUI();
      }

      refreshAll();
    });
  </script>
</body>
</html>
