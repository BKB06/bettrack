<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>BetTracker - Nova Aposta</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
</head>
<body>
  <div class="app-wrapper">
    <div id="global-topbar"></div>
    <div class="app-body" id="app-body">
      <aside class="desktop-sidebar" id="global-sidebar"></aside>
      
      <main class="app-main desktop-main mobile-main" id="app-main">
      <div style="margin-bottom: 16px;">
        <p class="eyebrow">NOVA</p>
        <h1 class="page-title">Registrar Aposta</h1>
      </div>

      <div class="card card--dashed" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
        <div>
          <div style="color: var(--green); font-weight: 700; font-size: 15px; display:flex; align-items:center; gap:6px;">📸 Importar Cupom</div>
          <div style="color: var(--muted); font-size: 12px; margin-top: 4px;">Envie um print e a IA preenche automaticamente</div>
        </div>
        <input type="file" id="ocr-upload" accept="image/*" style="display: none;">
        <button type="button" id="btn-import-ocr" class="btn btn--ghost" style="color: var(--green); border-color: var(--green);">Selecionar</button>
      </div>

      <form id="new-bet-form" class="card">
        <div class="field">
          <label class="field-label">Casa de Apostas</label>
          <select class="select" id="bet-bookmaker" required></select>
        </div>

        <div class="field">
          <label class="field-label">Categoria</label>
          <select class="select" id="bet-category" required>
            <option value="NBA">NBA</option>
            <option value="Futebol">Futebol</option>
            <option value="Outros">Outros</option>
          </select>
        </div>

        <div class="field">
          <label class="field-label">Evento / Descrição</label>
          <input type="text" class="input" id="bet-event" placeholder="Ex: Lakers vs Warriors — Moneyline Lakers" required>
        </div>

        <div class="field-grid-2">
          <div class="field">
            <label class="field-label">Odd</label>
            <input type="number" step="0.01" class="input" id="bet-odd" placeholder="Ex: 2.10" required>
          </div>
          <div class="field">
            <label class="field-label">Valor (R$)</label>
            <input type="number" step="0.01" class="input" id="bet-stake" placeholder="Ex: 50.00" required>
          </div>
        </div>

        <div class="field">
          <label class="field-label">Data</label>
          <input type="date" class="input" id="bet-date" required>
        </div>

        <div id="feedback-container"></div>

        <button type="submit" class="btn btn--primary btn--full" id="btn-submit" style="margin-top: 12px;">
          + Registrar Aposta
        </button>
      </form>
      </main>

      <aside class="desktop-right" id="global-right-panel"></aside>
    </div>
    <nav class="mobile-nav" id="global-mobile-nav"></nav>
  </div>

  <script src="app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const db = loadDb();
      const bkSelect = document.getElementById('bet-bookmaker');
      const oddInput = document.getElementById('bet-odd');
      const stakeInput = document.getElementById('bet-stake');
      const feedbackContainer = document.getElementById('feedback-container');
      const btnSubmit = document.getElementById('btn-submit');
      const form = document.getElementById('new-bet-form');

      // Set today's date
      document.getElementById('bet-date').valueAsDate = new Date();

      // Populate bookmakers
      if (db.bookmakers.length === 0) {
        bkSelect.innerHTML = '<option value="">Nenhuma casa cadastrada</option>';
      } else {
        db.bookmakers.forEach(bk => {
          const opt = document.createElement('option');
          opt.value = bk.id;
          const totalBalance = bk.sportsBalance + bk.casinoBalance;
          opt.textContent = `${bk.name} (Saldo: R$ ${totalBalance.toFixed(2)})`;
          bkSelect.appendChild(opt);
        });
      }

      function updateFeedback() {
        const odd = parseFloat(oddInput.value) || 0;
        const stake = parseFloat(stakeInput.value) || 0;
        const bkId = bkSelect.value;
        const bk = db.bookmakers.find(b => b.id === bkId);

        if (!bk || stake <= 0) {
          feedbackContainer.innerHTML = '';
          btnSubmit.disabled = false;
          return;
        }

        const balance = bk.sportsBalance + bk.casinoBalance;
        
        if (stake > balance) {
          feedbackContainer.innerHTML = `
            <div class="feedback-box feedback-box--error">
              <div class="feedback-row">
                <span class="feedback-row__label">Saldo Insuficiente</span>
                <span class="feedback-row__value">Em ${bk.name}</span>
              </div>
              <div class="feedback-row">
                <span class="feedback-row__label">Saldo disponível:</span>
                <span class="feedback-row__value" style="color:var(--text)">${formatMoney(balance)}</span>
              </div>
            </div>
          `;
          btnSubmit.disabled = true;
        } else if (odd > 1) {
          const retorno = stake * odd;
          const lucro = retorno - stake;
          feedbackContainer.innerHTML = `
            <div class="feedback-box feedback-box--ok">
              <div class="feedback-row">
                <span class="feedback-row__label">Retorno Potencial</span>
                <span class="feedback-row__value" style="color:var(--text)">${formatMoney(retorno)}</span>
              </div>
              <div class="feedback-row">
                <span class="feedback-row__label">Lucro Limpo</span>
                <span class="feedback-row__value">${formatMoney(lucro)}</span>
              </div>
            </div>
          `;
          btnSubmit.disabled = false;
        } else {
          feedbackContainer.innerHTML = '';
          btnSubmit.disabled = false;
        }
      }

      bkSelect.addEventListener('change', updateFeedback);
      oddInput.addEventListener('input', updateFeedback);
      stakeInput.addEventListener('input', updateFeedback);

      form.addEventListener('submit', (e) => {
        e.preventDefault();
        
        const bkId = bkSelect.value;
        const stake = parseFloat(stakeInput.value);
        const bkIndex = db.bookmakers.findIndex(b => b.id === bkId);
        
        if (bkIndex === -1) return;
        
        let bkRef = db.bookmakers[bkIndex];
        let totalBalance = bkRef.sportsBalance + bkRef.casinoBalance;
        
        if (stake > totalBalance) {
           alert('Saldo insuficiente na casa de apostas selecionada! Atualize seu banco/fundos primeiro ou altere o valor da aposta.');
           return;
        }

        // Deduct stake (prioritize sports balance)
        if (stake <= bkRef.sportsBalance) {
            bkRef.sportsBalance -= stake;
        } else {
            let remain = stake - bkRef.sportsBalance;
            bkRef.sportsBalance = 0;
            bkRef.casinoBalance -= remain;
        }

        // Add bet
        db.bets.push({
          id: generateId(),
          bookmakerId: bkId,
          category: document.getElementById('bet-category').value,
          event: document.getElementById('bet-event').value,
          odd: parseFloat(oddInput.value),
          stake: stake,
          date: document.getElementById('bet-date').value,
          status: 'pending',
          profit: 0
        });

        saveDb(db);
        alert('Aposta registrada com sucesso!');
        form.reset();
        document.getElementById('bet-date').valueAsDate = new Date();
        
        // Refresh dropdown text
        bkSelect.innerHTML = '';
        db.bookmakers.forEach(bk => {
          const opt = document.createElement('option');
          opt.value = bk.id;
          const totalBalance = bk.sportsBalance + bk.casinoBalance;
          opt.textContent = `${bk.name} (Saldo: R$ ${totalBalance.toFixed(2)})`;
          bkSelect.appendChild(opt);
        });
        updateFeedback();
      });

      // --- OCR LOGIC ---
      const btnOcr = document.getElementById('btn-import-ocr');
      const inputOcr = document.getElementById('ocr-upload');

      if (btnOcr && inputOcr) {
        btnOcr.addEventListener('click', () => {
          inputOcr.click();
        });

        inputOcr.addEventListener('change', async (e) => {
          const file = e.target.files[0];
          if (!file) return;

          const originalText = btnOcr.textContent;
          btnOcr.textContent = 'Lendo...';
          btnOcr.disabled = true;

          try {
            const result = await Tesseract.recognize(file, 'por', {
              logger: m => console.log(m)
            });
            const text = result.data.text;
            console.log("OCR Text:", text);
            parseBetText(text);

          } catch (error) {
            console.error('OCR Error:', error);
            alert('Erro ao ler o cupom. Tente uma imagem mais nítida.');
          } finally {
            btnOcr.textContent = originalText;
            btnOcr.disabled = false;
            inputOcr.value = '';
          }
        });
      }

      // --- TEXT PARSER ---
      function parseBetText(text) {
        const textLower = text.toLowerCase();
        
        // Limpa possíveis artefatos visuais e espaços excessivos
        let cleanText = text.replace(/[\r\n]+/g, '\n').trim();

        // 1. Parsing Casa
        const bks = Array.from(bkSelect.options);
        for (let opt of bks) {
          if (!opt.value) continue;
          const nameLower = opt.textContent.split(' (')[0].toLowerCase();
          if (nameLower && textLower.includes(nameLower)) {
            bkSelect.value = opt.value;
            break;
          }
        }

        // 2. Parsing Valor (Stake) e Ganhos Potenciais
        let stake = 0;
        let retornos = 0;

        // Betano "Simples R$ XX,XX" ou "Aposta R$ XX,XX"
        const stakePattern1 = cleanText.match(/(?:simples|múltipla|dupla|aposta|stake)\s*(?:r\$|brl|eur)?\s*(\d+[,.]\d{2})/i);
        const stakePattern2 = cleanText.match(/valor(?: da aposta)?[\s\S]{0,15}?(?:r\$|brl|eur)?\s*(\d+[,.]\d{2})/i);
        
        if (stakePattern1) {
          stake = parseFloat(stakePattern1[1].replace(',', '.'));
        } else if (stakePattern2) {
          stake = parseFloat(stakePattern2[1].replace(',', '.'));
        }

        // Tenta extrair Ganhos Potenciais/Retorno (Útil pra inferir a Odd)
        const retornosMatch = cleanText.match(/(?:ganhos potenciais|retornos?|potencial|pagamento)[\s\S]{0,20}?(?:r\$|brl|eur)?\s*(\d+[,.]\d{2})/i);
        if (retornosMatch) {
          retornos = parseFloat(retornosMatch[1].replace(',', '.'));
        }

        // Se stake ainda é 0, tenta achar o primeiro valor em dinheiro que NÃO seja o retorno
        if (stake === 0) {
           const fallbackStake = cleanText.match(/(?:r\$|brl)\s*(\d+[,.]\d{2})/i);
           if (fallbackStake) {
              const val = parseFloat(fallbackStake[1].replace(',', '.'));
              if (val !== retornos) stake = val;
           }
        }

        if (stake > 0) {
          stakeInput.value = stake;
        }

        // 3. Parsing Odd
        let odd = 0;
        let matchOdd = cleanText.match(/(?:odds totais|odd|@)\s*([0-9]+[,.][0-9]{2})/i);
        
        // Betano as vezes coloca a odd solta na frente do Simples (Ex: "Simples R$12,17  2.00")
        const topBarMatch = cleanText.match(/(?:simples|múltipla|dupla).*?r\$[\s\S]{0,10}?\d+[,.]\d{2}\s*([1-9][0-9]*[,.][0-9]{2})/i);

        if (matchOdd) {
          odd = parseFloat(matchOdd[1].replace(',', '.'));
        } else if (topBarMatch) {
          odd = parseFloat(topBarMatch[1].replace(',', '.'));
        } else if (stake > 0 && retornos > 0) {
          // Calcula ODD real com base no retorno
          odd = Math.round((retornos / stake) * 100) / 100;
        } else {
          // Último caso: Encontrar a primeira Odd típica solta no texto (Ignorando Valores Financeiros rastreados)
          const decimals = [...cleanText.matchAll(/\b([1-9][0-9]*[,.][0-9]{2})\b/g)].map(m => parseFloat(m[1].replace(',', '.')));
          const cand = decimals.find(v => v !== stake && v !== retornos && v >= 1.01 && v <= 100.0);
          if (cand) odd = cand;
        }

        if (odd >= 1.01) {
          oddInput.value = odd;
        } else {
          oddInput.value = 1.0; // Evitar que fique vazio/zero se falhar
        }

        // 4. Parsing Evento / Descrição
        const lines = cleanText.split('\n').map(l => l.trim()).filter(l => l.length > 2);
        
        const isInvalid = (l) => {
          const lw = l.toLowerCase();
          return lw.includes('playoff') || lw.includes('aposta') || 
                 lw.includes('odds') || lw.includes('ganhos') || 
                 lw.includes('retornos') || lw.includes('superbet') ||
                 lw.includes('betano') || lw.includes('bet365') || 
                 lw.includes('informações sobre') ||
                 lw.match(/^[\d.,\s$r]+$/i);
        };

        let validLines = lines.filter(l => !isInvalid(l));
        
        let desc = "";
        const eventIdx = validLines.findIndex(l => l.match(/\s+(x|vs|—|-|–)\s+/i));

        if (eventIdx !== -1) {
          desc = validLines[eventIdx];
          if (eventIdx > 0) {
             desc = validLines[eventIdx - 1] + ' - ' + desc;
          }
        } else {
          // Pega apenas a primeira linha válida para a descrição principal e evita grudar odds/times bagunçados
          if (validLines.length > 0) desc = validLines[0];
          
          // Se tiver um " X " na segunda linha, anexa (é o confronto provável)
          if (validLines.length > 1 && validLines[1].match(/\s+(x|vs)\s+/i)) {
             desc += " - " + validLines[1];
          }
        }
        
        // Remove a sujeira "3 Q Simples R$12,17 200 A" ou falhas de quebra de linha do OCR 
        desc = desc.replace(/^.*?(?:simples|múltipla|dupla)[\s\S]*?(?:r\$|brl|eur)?\s*\d+[,.]\d{2}[^a-zA-ZÀ-ÿ]*(?=[a-zA-ZÀ-ÿ])/i, '');
        
        // Remove odds da Betano "soltas" no meio do texto e tudo que vier depois (ex: '2.00 Arsenal 27º' ou só '2.00' no final)
        desc = desc.replace(/\s+\d+[,.]\d{2}(?:\s+.*)?$/, '');

        // Limpa possíveis artefatos como "BD ", "(e ", "a ", ícones iniciais
        desc = desc.replace(/^[\s\W_]+/, '').replace(/^(?:e|a|q|o|bd)\s+/i, '').replace(/^[\s\W_]+/, '').trim();
        
        if (desc) {
          document.getElementById('bet-event').value = desc;
        }

        updateFeedback();
      }

      // --- CLIPBOARD PASTE LOGIC ---
      document.addEventListener('paste', async (e) => {
        // Se colar imagem
        const items = (e.clipboardData || e.originalEvent.clipboardData).items;
        for (let item of items) {
          if (item.type.indexOf('image') === 0) {
            // Tem uma imagem no clipboard! Vamos jogar direto no OCR se o tesseract estiver lá.
            e.preventDefault();
            const blob = item.getAsFile();
            if(!blob) continue;

            if (btnOcr) {
              const originalText = btnOcr.textContent;
              btnOcr.textContent = 'Lendo Área de Transferência...';
              btnOcr.disabled = true;

              try {
                const result = await Tesseract.recognize(blob, 'por');
                console.log("OCR Paste:", result.data.text);
                parseBetText(result.data.text);
              } catch(err) {
                console.error(err);
                alert("Erro OCR no colar: " + err.message);
              } finally {
                btnOcr.textContent = originalText;
                btnOcr.disabled = false;
              }
            }
            return;
          } else if (item.type === 'text/plain') {
            // Pode ser texto colado do site
            item.getAsString(text => {
               // Se o texto parecer um bilhete (tem R$, tem Odds, etc), usar o parseBetText
               // Só preenche se o usuário não tiver focado dentro de um campo de texto e digitando
               const activeEl = document.activeElement;
               if (activeEl && (activeEl.tagName === 'INPUT' || activeEl.tagName === 'TEXTAREA') && activeEl.id !== 'bet-event') {
                 // Se o usuário está digitando especificamente na ODD ou Valor, deixa passar normalmente.
               } else if (text.toLowerCase().includes('aposta') || text.includes('R$')) {
                 e.preventDefault();
                 parseBetText(text);
               }
            });
          }
        }
      });
    });
  </script>
</body>
</html>
